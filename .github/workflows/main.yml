name: Check Runner Location

on:
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动触发运行
  push:
    branches:
      - main         # 当代码推送到 main 分支时自动运行（可根据需要修改或删除）

jobs:
  get-location:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 运行器
    
    steps:
      - name: 获取当前运行器的 IP 及地理位置
        run: |
          echo "正在查询 GitHub 托管虚拟机的网络信息..."
          echo "--------------------------------------------------"
          
          # 使用 curl 请求 ipinfo.io 接口，并用 jq 格式化输出 JSON 数据
          curl -s https://ipinfo.io/json | jq '{
            "IP地址": .ip, 
            "城市": .city, 
            "地区 (美东/美西等)": .region, 
            "国家": .country, 
            "经纬度": .loc,
            "运营商": .org
          }'
          
          echo "--------------------------------------------------"
