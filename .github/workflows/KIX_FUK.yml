name: AS906 APAC/KIX_FUK One-off Scan
on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: "Stage 0: Fetch AS906 prefixes (same source as main project)"
        run: |
          curl -s -m 30 "https://stat.ripe.net/data/announced-prefixes/data.json?resource=AS906" -o prefixes.json
          count=$(python3 -c "import json;print(len(json.load(open('prefixes.json'))['data']['prefixes']))")
          echo "AS906 前缀总数：$count"

      - name: "Stage 1: Geo-filter prefixes to APAC (JP/TW/HK/SG/KR/MY/PH/TH/VN/ID) via ip-api.com batch"
        run: |
          python3 <<'EOF'
          import json, ipaddress, urllib.request

          APAC = {"JP","TW","HK","SG","KR","MY","PH","TH","VN","ID"}

          data = json.load(open('prefixes.json'))
          prefixes = [p['prefix'] for p in data['data']['prefixes'] if ':' not in p['prefix']]

          # 每个前缀取代表地址(首个可用地址)做地理定位
          rep_ips = []
          nets = []
          for pfx in prefixes:
              net = ipaddress.ip_network(pfx, strict=False)
              hosts = list(net.hosts())
              if hosts:
                  rep_ips.append(str(hosts[0]))
                  nets.append(pfx)

          # ip-api.com batch 接口,每批最多 100 个
          geo = {}
          for i in range(0, len(rep_ips), 100):
              batch = rep_ips[i:i+100]
              req = urllib.request.Request(
                  "http://ip-api.com/batch?fields=query,countryCode",
                  data=json.dumps(batch).encode(),
                  headers={"Content-Type": "application/json"}
              )
              try:
                  resp = json.loads(urllib.request.urlopen(req, timeout=15).read())
                  for r in resp:
                      geo[r.get("query")] = r.get("countryCode")
              except Exception as e:
                  print(f"batch {i} 查询失败: {e}")

          survivors = []
          for pfx, ip in zip(nets, rep_ips):
              cc = geo.get(ip)
              if cc in APAC:
                  survivors.append((pfx, cc))

          with open('survivors.json', 'w') as f:
              json.dump(survivors, f)

          print(f"地理定位完成,APAC 存活前缀数：{len(survivors)} / {len(nets)}")
          for pfx, cc in survivors:
              print(f"  {pfx}  {cc}")
          EOF

      - name: "Stage 2: Sample candidates from APAC survivors, target ~2000 total"
        run: |
          python3 <<'EOF'
          import json, ipaddress, random

          TARGET_TOTAL = 2000
          MAX_PER_PREFIX = 40  # 单前缀采样上限,防止小范围过采样

          survivors = json.load(open('survivors.json'))
          if not survivors:
              print("⚠️ 没有 APAC 存活前缀,候选池为空")
              open('candidates.txt', 'w').close()
          else:
              per_prefix = max(1, min(MAX_PER_PREFIX, TARGET_TOTAL // len(survivors)))
              candidates = []
              for pfx, cc in survivors:
                  net = ipaddress.ip_network(pfx, strict=False)
                  hosts = list(net.hosts())
                  if not hosts:
                      continue
                  if len(hosts) <= per_prefix:
                      candidates.extend(str(h) for h in hosts)
                  else:
                      candidates.extend(str(h) for h in random.sample(hosts, per_prefix))

              # 若超出目标总量,随机裁剪到 ~2000
              if len(candidates) > TARGET_TOTAL:
                  candidates = random.sample(candidates, TARGET_TOTAL)

              with open('candidates.txt', 'w') as f:
                  f.write('\n'.join(candidates))
              print(f"每前缀采样数：{per_prefix}，最终候选总数：{len(candidates)}")
          EOF

      - name: "Stage 3: SNI-fronting probe, filter colo=KIX or FUK only"
        run: |
          set +e
          PROBE_HOST="ipv4.090227.xyz"
          mkdir -p results

          probe_one() {
            local ip="$1"
            resp=$(curl -s -m 6 --connect-timeout 3 --resolve "${PROBE_HOST}:443:${ip}" "https://${PROBE_HOST}/cdn-cgi/trace" 2>/dev/null)
            if echo "$resp" | grep -q '^ip=' && echo "$resp" | grep -q '^colo='; then
              colo=$(echo "$resp" | grep '^colo=' | cut -d'=' -f2 | tr -d '\r')
              echo "${ip}:443#${colo}" > "results/${ip//./_}.txt"
            fi
            return 0
          }
          export -f probe_one
          export PROBE_HOST

          if [ -s candidates.txt ]; then
            while IFS= read -r ip || [ -n "$ip" ]; do
              [ -z "$ip" ] && continue
              probe_one "$ip" &
              if [ "$(jobs -r | wc -l)" -ge 15 ]; then
                wait -n || true
              fi
            done < candidates.txt
            wait
          fi

          find results -name "*.txt" -exec cat {} + > all_hits.txt 2>/dev/null || > all_hits.txt
          grep -E "#(KIX|FUK)$" all_hits.txt > target_hits.txt || > target_hits.txt

          echo "## AS906 APAC→KIX|FUK 一次性扫描结果" >> "$GITHUB_STEP_SUMMARY"
          echo "候选总数：$(wc -l < candidates.txt)" >> "$GITHUB_STEP_SUMMARY"
          echo "通过 CF 边缘验证(全部地区)：$(wc -l < all_hits.txt) 个" >> "$GITHUB_STEP_SUMMARY"
          echo "其中 colo=KIX/FUK：$(wc -l < target_hits.txt) 个" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat target_hits.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: as906-apac-kix-fuk-results
          path: |
            survivors.json
            candidates.txt
            all_hits.txt
            target_hits.txt
